name: Quality Gates

on:
  pull_request:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run CI Quality Gate (Encoding & Imports)
        run: node scripts/quality-gate-ci.js

      - name: Run Type Check
        run: npm run type-check || echo 'Type-check warnings (non-blocking)'
        env:
          NODE_OPTIONS: "--max-old-space-size=4096"

      - name: Run Build
        run: npx -y prisma@6.7.0 generate && next build
